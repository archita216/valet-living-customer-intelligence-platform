name: Build and Deploy Container to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: valet-living-intelligence-suite # Replace with your Azure App Service web app name
  CONTAINER_REGISTRY: valetregistry.azurecr.io      # Replace with your Azure Container Registry (ACR) login server
  IMAGE_NAME: valet-living-agent
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Azure Container Registry (ACR)
      # Note: You will need to create secrets in your GitHub repository:
      # - ACR_USERNAME
      # - ACR_PASSWORD
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build and push the Docker image
      # The Dockerfile automatically compiles the FAISS index during the build process
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # Log in to Azure
      # Note: You will need to create a secret in your GitHub repository:
      # - AZURE_CREDENTIALS (created via Azure CLI: az ad sp create-for-rbac)
      # OR use a Publish Profile:
      # - AZURE_WEBAPP_PUBLISH_PROFILE
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy the container to Azure App Service
      - name: Deploy Container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
